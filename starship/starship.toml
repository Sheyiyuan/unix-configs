"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](fg:bg_os)\
$os\
$username\
[](bg:primary fg:secondary)\
$directory\
[](fg:primary bg:bg_git)\
$git_branch\
$git_status\
[](fg:bg_git bg:bg_lang)\
$nodejs\
$rust\
$golang\
$php\
$c\
$cpp\
$dotnet\
$rlang\
$python\
$typst\
$dart\
$java\
$lua\
[](fg:bg_lang bg:bg_time)\
$time\
[ ](fg:bg_time)\
\n$character"""

palette = "default"

[palettes.default]
# 主色调
primary = "#769ff0"
secondary = "#a3aed2"
# 背景色阶
bg_os = "#a3aed2"
bg_dir = "#769ff0"
bg_git = "#394260"
bg_lang = "#212736"
bg_time = "#1d2230"
bg_prompt = "#090c0c"
# 文字色
text_primary = "#e3e5e5"
text_secondary = "#a0a9cb"
# 状态色
success = "#8aac8b"
error = "#d97365"
vim_replace = "#8aacab"
vim_visual = "#aca98a"

[os]
disabled = false
style = "bg:secondary fg:bg_prompt"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:secondary fg:bg_prompt"
style_root = "bg:secondary fg:bg_prompt"
format = '[ $user ]($style)'

[directory]
style = "fg:text_primary bg:primary"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"~" = "󰋜"
"Documents" = "󰈙"
"Downloads" = ""
"Music" = ""
"Pictures" = ""

[git_branch]
symbol = ""
style = "bg:bg_git"
format = '[[ $symbol $branch ](fg:primary bg:bg_git)]($style)'

[git_status]
style = "bg:bg_git"
format = '[[($all_status$ahead_behind )](fg:primary bg:bg_git)]($style)'

[nodejs]
symbol = ""
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[rust]
symbol = ""
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[golang]
symbol = ""
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[php]
symbol = ""
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[c]
symbol = "󰙱"
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[cpp]
symbol = "󰙲"
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[dotnet]
symbol = "󰌛"
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[rlang]
symbol = "󰟔"
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[python]
symbol = "󰌠"
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[typst]
symbol = ""
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[dart]
symbol = ""
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[java]
symbol = "󰬷"
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[lua]
symbol = "󰢱"
style = "bg:bg_lang"
format = '[[ $symbol ($version) ](fg:primary bg:bg_lang)]($style)'

[time]
disabled = false
time_format = "%T"
style = "bg:bg_time"
format = '[[  $time ](fg:text_secondary bg:bg_time)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:success)'
error_symbol = '[](bold fg:error)'
vimcmd_symbol = '[](bold fg:success)'
vimcmd_replace_one_symbol = '[](bold fg:vim_replace)'
vimcmd_replace_symbol = '[](bold fg:vim_replace)'
vimcmd_visual_symbol = '[](bold fg:vim_visual)'
