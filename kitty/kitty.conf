# 主题基础设置：加载固定的 Matugen 主题模板（如有通用配色/变量）
include themes/matugen.conf
window_padding_width 5

# 复显示窗口边框和标题栏
hide_window_decorations no

background_opacity 0.8

# 使用现代 Kitty 语法显式指定字重为常规 (style=Regular)
font_family family="0xProto Nerd Font Mono" style=Regular

font_size 13.5
remember_window_size no
confirm_os_window_close 0
shell zsh
cursor_trail 1
cursor_shape block
shell_integration no-cursor

initial_window_width 110c
initial_window_height 32c

# BEGIN_KITTY_THEME
# Matugen（主题生成器会写入/更新 current-theme.conf）
# 这里按需覆盖上面的基础主题设置；想切换颜色时改 current-theme.conf
include current-theme.conf
# END_KITTY_THEME
